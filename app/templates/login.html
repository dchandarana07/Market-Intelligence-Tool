{% extends "base.html" %}

{% block title %}Sign In &middot; Market Intelligence{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-xl p-8 text-center">
        <div class="w-16 h-16 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-asu-maroon to-asu-gold flex items-center justify-center text-white font-bold text-xl shadow-lg">MI</div>
        <h1 class="text-xl font-bold mb-2">Secure Access</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-8">Authenticate with your organizational Google Workspace.</p>

        {% if error %}
        <div class="mb-6 p-3 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 text-sm">{{ error }}</div>
        {% endif %}

        <a href="/auth/callback-init" class="flex items-center justify-center gap-3 w-full py-3 px-6 rounded-full bg-asu-maroon hover:bg-asu-maroon-dark text-white font-semibold shadow-lg hover:shadow-xl transition-all">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
            Sign in with Google
        </a>

        <p class="text-xs text-gray-400 dark:text-gray-500 mt-6">Need access? Contact your administrator.</p>
    </div>
</div>
{% endblock %}
